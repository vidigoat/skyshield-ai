<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Earth meridian arcs (the shield) -->
  <ellipse cx="32" cy="32" rx="22" ry="10" fill="none" stroke="#0a0a0a" stroke-width="2.5"/>
  <ellipse cx="32" cy="32" rx="10" ry="22" fill="none" stroke="#0a0a0a" stroke-width="2.5"/>
  <!-- Satellite orbit ring (dashed) -->
  <ellipse cx="32" cy="32" rx="26" ry="14" fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="2,3" transform="rotate(-25 32 32)"/>
  <!-- A satellite dot -->
  <circle cx="55" cy="20" r="3.5" fill="#0a0a0a"/>
</svg>
